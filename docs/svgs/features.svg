<svg fill="none" viewBox="0 0 1200 340" width="100%" height="340" xmlns="http://www.w3.org/2000/svg">
    <foreignObject width="100%" height="100%">
        <div xmlns="http://www.w3.org/1999/xhtml">
            <style>
                .container {
                    display: grid;
                    grid-template-columns: 1fr 1fr;
                    gap: 20px;
                    padding: 20px;
                }
                .alert-box {
                    border-left: 4px solid #42b883;
                    padding: 12px;
                    margin-bottom: 16px;
                    border-radius: 6px;
                    background: rgba(66, 184, 131, 0.1);
                    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                    width: 100%;
                    box-sizing: border-box;
                }
                .alert-title {
                    margin: 0 0 8px 0;
                    font-weight: 600;
                }
                .alert-content {
                    margin: 0;
                    line-height: 1.5;
                }

                /* Light mode */
                @media (prefers-color-scheme: light) {
                    .alert-title { color: #000000; }
                    .alert-content { color: #333333; }
                    .alert-box { background: rgba(66, 184, 131, 0.1); }
                }

                /* Dark mode */
                @media (prefers-color-scheme: dark) {
                    .alert-title { color: #ffffff; }
                    .alert-content { color: #ffffff; }
                    .alert-box { background: rgba(66, 184, 131, 0.18); }
                }
            </style>
            <div class="container">
                <div class="alert-box">
                    <p class="alert-title"><strong>Battle Tested</strong></p>
                    <p class="alert-content">100% PHPUnit coverage • 100% Infection MSI • Super-Linter • StyleCI</p>
                </div>
                <div class="alert-box">
                    <p class="alert-title"><strong>Inertia v3</strong></p>
                    <p class="alert-content">Deferred, merge, once props • Partial reloads • CSRF cookie-to-header</p>
                </div>
                <div class="alert-box">
                    <p class="alert-title"><strong>PHP 8.2+</strong></p>
                    <p class="alert-content">Strict types • Readonly props • Enums • PHPStan Level Max ready</p>
                </div>
                <div class="alert-box">
                    <p class="alert-title"><strong>Vite Integration</strong></p>
                    <p class="alert-content">Dev server tags • Manifest-driven production • modulepreload support</p>
                </div>
                <div class="alert-box">
                    <p class="alert-title"><strong>Vue Bootstrap</strong></p>
                    <p class="alert-content">Drop-in Yii2 bootstrap class • Vue-aware root view • Inertia payload injection</p>
                </div>
                <div class="alert-box">
                    <p class="alert-title"><strong>Zero Config</strong></p>
                    <p class="alert-content">Canonical yii\inertia\Vite renderer • No framework-specific preamble needed</p>
                </div>
            </div>
        </div>
    </foreignObject>
</svg>
